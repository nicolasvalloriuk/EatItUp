<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- metadata for search engines -->
  <meta name="description" content="Search for recipes using TheMealDB API. Enter a keyword to find delicious meals and their details.">
  <meta name="keywords" content="recipe search, TheMealDB, meals, cooking, food, ingredients">
  <!-- Title -->
  <title>Eat It Up!</title>
  <!-- Imports -->
    
    <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    
  <!-- Google Fonts-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap');
  </style>
    <!-- CSS  -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <header>
  <!-- Navigation -->
    <nav class="navbar col-12 navbar-expand-lg ">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand logo" href="#index.html">
          <img class="logo-img" src="assets\images\favicons\android-chrome-192x192.png" alt="Logo">
          Eat It Up!
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link disabled" aria-disabled="true">IBS</a>
            </li>
            <li class="nav-item">
              <a class="nav-link disabled" aria-disabled="true">About Us</a>
            </li>
          </ul>
          <!-- Search Bar -->
          <div class="search-wrapper">
            <div class="search-container">
              <input class="form-control me-2" id="query" type="text" placeholder="Search" style="width: 250px;" aria-label="Search"/>
              <div id="suggestions"></div>  
            </div>

            <button class="btn btn-outline-secondary my-custom-btn" onclick="searchRecipes()">Search</button>
          </div>  
        </div>
      </div>
    </nav>
  </header>
  <main>
    <div class="container-fluid">
      <div class="row">
        <div class="col-8"> 
          <a href="https://www.themealdb.com/api.php" target="_blank">TheMealDB API</a>
        </div>
        <div class="col-4">
           <h2>Recipe Title</h2>
          <p>Recipe description</p>
        </div>
      </div>
    </div>
    <div>
      <div class="row">
        <div class="results-container col -12">
          <div class="col-6">
            <img id="recipe-img" alt="Recipe image"> 
            <h2 id="recipe-title"></h2>
          </div>
          <div class="col-6">
            <h3>Ingredients</h3>
            <ul id="recipe-ingredients"></ul>
          </div>
          <div class="col-12">
            <h3>Instructions</h3>
            <p id="recipe-instructions"></p>
            <div id="recipe-video"></div>
        </div>
      </div>
    </div>
    <div>
      
    </div>
  
  </main>
  <footer>

  </footer>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <!-- JS -->
  <script src="assets/js/recipe.js"></script>
</body>
</html>
